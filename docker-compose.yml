version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dev-itc
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: platfi_intelligence_demo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: dev-itc-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
